<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Journal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>My Map Journal</h2>

<div class="controls">
  <label for="photoInput" class="custom-btn">📸 Upload Photo</label>
  <input type="file" id="photoInput" accept="image/*" hidden>

  <label for="importInput" class="custom-btn">📥 Import Another Map</label>
  <input type="file" id="importInput" accept=".json" hidden>

  <button id="exportBtn" class="custom-btn">📤 Export My Map</button>
  <button id="clearBtn" class="custom-btn">🗑 Clear All Map Data</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
